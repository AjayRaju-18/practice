<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            background: #fff;
            padding: 2rem 3rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            background: #0078d7;
            color: #fff;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Your Simple Web App!</h1>
        <p>Click the button to see a message.</p>
        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </div>
    <script>
        function showMessage() {
            document.getElementById('message').textContent = 'Hello, world! This is your simple web app.';
        }
    </script>
</body>
</html>
